<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginFrom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .icon{
            width: 25px;
            height: 25px;
        }
        .facebook{
            display: flex;
            gap: 50px;
        }
        .google{
            display: flex;
            gap: 56px;
        }
        
    </style>
</head>
<body>
    <form class="bg-white border border-1 w-25 m-auto p-3 rounded-2">
        <h2 class="text-center">Login</h2>

        <div class="d-flex flex-column gap-3">
            <input type="email" placeholder="Email" class="form-control">
            <input type="password" placeholder="Password" class="form-control">
        </div>

        <div class="text-center mt-3">
            <a href="#" class="text-decoration-none">Forgot password?</a>
        </div>

        <div class="mt-3">
            <button type="" class="btn btn-primary w-100">Login</button>
        </div>

        <div class="text-center mt-2">
            <p>Don't have an account? <a href="SignupForm.html">Sigup</a></p>
        </div>

        <div class="d-flex gap-3 text-secondary">
            <hr class="w-100">
            <p>or</p>
            <hr class="w-100">
        </div>

        <div class="d-flex flex-column gap-3">
            <button type="" class="btn btn-primary w-100 facebook"><img class="icon" src="https://img.icons8.com/?size=100&id=uLWV5A9vXIPu&format=png&color=000000" alt="">Login with Facebook</button>
            <button type="" class="btn btn-secondary w-100 google"><img class="icon" src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" alt="">Login with Google</button>
        </div>
    </form>
</body>
</html>
